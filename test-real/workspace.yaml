# Real single run: python + claude-code only
factors:
  language:
    levels: [python, typescript]
  agent:
    levels: [claude-code, stub]

responses:
  - code_quality
  - build_time

tasks:
  - source: bundled://rest-api-crud

playpen:
  runner: local
  replicates: 1
  timeout_minutes: 10

design:
  screening_resolution: 3
  significance_threshold: 0.10

promotion:
  screening_to_trial: { p_value: 0.10 }
  trial_to_production: { posterior_confidence: 0.80 }
