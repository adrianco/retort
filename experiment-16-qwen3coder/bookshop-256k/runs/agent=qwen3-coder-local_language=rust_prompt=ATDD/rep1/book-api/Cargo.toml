[package]
name = "book-api"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "macros"] }
tokio = { version = "1.0", features = ["full"] }
tower = "0.4"
uuid = { version = "1.0", features = ["v4"] }

[dev-dependencies]
reqwest = { version = "0.11", features = ["json"] }