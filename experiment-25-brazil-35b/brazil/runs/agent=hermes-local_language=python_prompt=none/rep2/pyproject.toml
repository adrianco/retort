[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "brazilian-soccer-mcp"
version = "1.0.0"
description = "MCP Server for Brazilian Soccer Knowledge Graph"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "pandas>=2.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
brazilian-soccer-mcp = "brazilian_soccer_mcp.server:main"
