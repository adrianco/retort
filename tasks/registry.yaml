# Retort task registry
# =====================
# Index of known tasks. Each task has a `source` — the canonical, resolvable
# URI it loads from — and a description. Reference a task anywhere a source is
# expected (workspace.yaml `source:` or `retort run --task`) by its bare name;
# it resolves through this registry. List it with `retort tasks list`.
#
# A `source` is one of:
#   bundled://<name>      a task bundled in this repo under tasks/<name>/
#   github://<o>/<r>[/f]  a task in a GitHub repo (a "Use this template" repo
#                         is the recommended way to share one); optional trailing
#                         path picks the spec file
#   local://<path>        a task directory on disk
#   git://<url>           any git repo
#
# To add a task: drop a tasks/<name>/ dir (with task.yaml) and add a
# `bundled://` row, OR publish it to a GitHub repo and add a `github://` row.

tasks:
  - name: rest-api-crud
    source: bundled://rest-api-crud
    description: CRUD REST API for a book catalog — the "easy" task (exp 1, 6, 7-bookshop, 8).

  - name: brazil-bench
    source: github://brazil-bench/benchmark-template/brazilian-soccer-mcp-guide.md
    description: Brazilian-soccer MCP server built from a multi-file guide — the "hard" task (exp 2-5, 7-brazil).

  - name: brazil-bench-neutral
    source: github://adrianco/brazil-bench-neutral/brazilian-soccer-mcp-guide.md
    description: brazil-bench with all testing-methodology (BDD) guidance removed — methodology-neutral fork for prompt-factor experiments (neutral/TDD/ATDD), exp-13. Same functional requirements as brazil-bench.

  - name: react-dashboard
    source: bundled://react-dashboard
    description: React analytics dashboard single-page app.

  - name: cli-data-pipeline
    source: bundled://cli-data-pipeline
    description: Command-line ETL data pipeline.

  - name: funkygibbon-port
    source: github://adrianco/funkygibbon-port-bench/funkygibbon-mcp-port-guide.md
    description: >-
      Port the FunkyGibbon MCP client to a new language by EXTENDING an existing
      real repo (adrianco/the-goodies): a sync client (inbetweenies-v2) + local
      graph cache + 12-tool stdio MCP server, conformant on the wire with Python
      (blowing-off) and TypeScript (kittenkong) references. The "extend a large
      existing codebase" task; guide + fixtures authored in tasks/funkygibbon-port/.
      Until the GitHub template repo exists, switch source to
      bundled://funkygibbon-port to run from this repo.
