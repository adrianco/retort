[package]
name = "book_api"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
actix-rt = "2.9"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "macros", "sqlite"] }
uuid = { version = "1.5", features = ["v4", "serde"] }
validator = "0.18"
tokio = { version = "1.0", features = ["full"] }
