[package]
name = "book_api"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
diesel = { version = "2.0.3", features = ["sqlite"] }
dotenvy = "0.15"
uuid = { version = "1.3", features = ["serde", "v4"] }
validator = "0.16"
diesel_migrations = "2.3.1"
