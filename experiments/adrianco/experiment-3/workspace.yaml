# Experiment 3 — Model version × Language × Tooling: quarter-fraction design
#
# Primary question: does claude-opus-4-7 outperform claude-opus-4-6, and does
# the answer depend on language or tooling?
#
# Full factorial: 2 model × 6 language × 2 tooling = 24 cells
# Quarter fraction: 6 cells (1 per language) × 2 replicates = 12 runs
# 18 unrun cells are predicted from the fitted ANOVA model with 95% CI via
#   retort analyze --predict
#
# Cost model: ~10 min/cell × 6 cells × 2 reps ≈ 2 hours sequential,
# ~30 min wall-clock split across 4 parallel --shard 0/4..3/4 polecats.
#
# ── Quarter-fraction design matrix ──────────────────────────────────────────
#
#   cell  language    model           tooling   why this cell
#   ----  ----------  --------------  --------  --------------------------------
#   A     python      claude-opus-4-6 none      anchor cell: 4-6 × none
#   B     typescript  claude-opus-4-6 beads     4-6 × beads singleton
#   C     go          claude-opus-4-7 none      4-7 × none singleton
#   D     rust        claude-opus-4-7 beads     anchor cell: 4-7 × beads
#   E     java        claude-opus-4-6 none      paired with A — same cell
#   F     clojure     claude-opus-4-7 beads     paired with D — same cell
#
#   Model balance :  4-6 → {python, typescript, java}  (3 runs)
#                    4-7 → {go, rust, clojure}          (3 runs)
#   Tooling balance: none  → {python, go, java}         (3 runs)
#                    beads → {typescript, rust, clojure} (3 runs)
#   Model×Tooling  : (4-6,none)×2  (4-6,beads)×1  (4-7,none)×1  (4-7,beads)×2
#                    — 2-1-1-2 is the minimum imbalance achievable with 6 runs
#                    when both binary factors are individually balanced.
#
# ── Aliasing structure (Resolution III) ─────────────────────────────────────
#
#   Effect               Aliases with
#   ─────────────────    ───────────────────────────────────────────────────
#   model main           language contrast {py,ts,java} vs {go,rust,clojure}
#                        × tooling interaction
#   tooling main         language contrast {py,go,java} vs {ts,rust,clojure}
#                        × model interaction
#   model × tooling 2FI  language contrast {py,rust,java,clojure} vs {ts,go}
#   language (3 of 5     estimable free of model/tooling (the contrasts that
#   contrasts)           are orthogonal to the M and T assignments)
#
#   model and tooling main effects are mutually independent (each balanced)
#   but share a partial correlation of r = 1/3 through the 2-1-1-2 M×T
#   distribution — VIF ≈ 1.13, well within acceptable range.
#   Unrun cells are predicted via multiplicative ANOVA: retort analyze --predict
#
# ── Cross-experiment comparability ──────────────────────────────────────────
#
#   claude-opus-4-6 is the same model that ran as the `opus` alias in
#   experiments 1 & 2 — those level names are left unchanged so older
#   run directories stay valid. Versioned IDs are used here and going
#   forward; don't backfill them into earlier experiments.
#
# ── Running this design ─────────────────────────────────────────────────────
#
#   The retort generator auto-expands a 6-level language factor to the full
#   24-cell factorial. To run only the 6 quarter-fraction cells above, use the
#   planned design CSV instead of the auto-generator:
#
#     retort design generate --phase screening \
#       --config experiment-3/workspace.yaml \
#       -o experiment-3/design.csv
#     # edit design.csv to keep only cells A–F, then:
#     retort run --phase screening \
#       --config experiment-3/workspace.yaml \
#       --design experiment-3/design.csv      # (--design flag: pending retort PR)
#
#   Until the --design flag lands, run cells manually via:
#     retort run --phase screening --config experiment-3/workspace.yaml \
#       --shard 0/4   # repeat for 1/4, 2/4, 3/4 on separate polecats

experiment:
  name: experiment-3-model-version-quarter-fraction
  visibility: public

# Factors match experiment-2 for cross-experiment ANOVA comparability.
# tooling is restored (was dropped in the initial draft); it becomes
# estimable via the quarter-fraction design above.
factors:
  language:
    levels: [python, typescript, go, rust, java, clojure]
  model:
    levels: [claude-opus-4-6, claude-opus-4-7]
  tooling:
    levels: [none, beads]

responses:
  - code_quality
  - token_efficiency
  - test_coverage
  - defect_rate
  - maintainability
  - idiomatic

tasks:
  - source: github://brazil-bench/benchmark-template/brazilian-soccer-mcp-guide.md

playpen:
  runner: local
  replicates: 2
  timeout_minutes: 45
  max_turns: 200

design:
  screening_resolution: 3
  significance_threshold: 0.10

promotion:
  screening_to_trial: { p_value: 0.10 }
  trial_to_production: { posterior_confidence: 0.80 }

evaluation:
  enabled: true
  model: haiku
  min_severity_to_file: high
  issue_tracker: beads
