[package]
name = "book_api"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.7"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "macros"] }
chrono = { version = "0.4", features = ["serde"] }
tower = "0.4"
serde_json = "1.0"
hyper = "1.0"