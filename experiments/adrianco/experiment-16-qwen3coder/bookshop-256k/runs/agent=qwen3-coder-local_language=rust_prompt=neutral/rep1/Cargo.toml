[package]
name = "book-api"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.7"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "macros"] }
tower = "0.4"
uuid = { version = "1.0", features = ["v4", "serde"] }

[lib]
name = "book_api_lib"
path = "src/lib.rs"

[[bin]]
name = "book-api"
path = "src/main.rs"