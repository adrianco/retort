[package]
name = "book-api"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
env_logger = "0.10"
lazy_static = "1.4"

[[bin]]
name = "book-api"
path = "src/main.rs"