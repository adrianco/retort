# Experiment 43 — MORE LANGUAGES exploration: C / C++ / Objective-C / Swift.
# Initial cloud-vs-local comparison on bookshop: Opus 4.8 vs the leading local stack
# (Qwen3-Coder-Next 80B at context_threshold 0.9), 1 replicate = 8 runs.
#
# Scorer support landed 2026-07-22: toolchains (c/cpp/objc/swift), extension maps in
# all per-file scorers, and test_coverage (swift via SwiftPM; c/cpp/objc via
# _native_coverage — CMake+CTest / Makefile / xcodebuild, pass-rate as the proxy).
# READY TO RUN. Smoke-test one c + one swift stack end-to-end before the full grid
# (CLAUDE.md), and remember Objective-C is macOS-only (needs full Xcode).
experiment:
  name: experiment-43-morelangs-bookshop
  visibility: public
factors:
  language: { levels: [c, cpp, objc, swift] }
  agent: { levels: [hermes-local, claude-code] }
  prompt: { levels: [neutral, none] }   # design pins 'neutral'; registry needs >=2
  stack: { levels: [m80, m35] }          # design pins m80 for local; unused for cloud
  model: { levels: ["mlxlocal/mlx-community--Qwen3-Coder-Next-4bit", "claude-opus-4-8"] }
responses: [code_quality, token_efficiency, test_coverage, defect_rate, maintainability, idiomatic]
tasks:
  - source: bundled://rest-api-crud
playpen:
  runner: local
  replicates: 1                # exploration — one replicate for the first comparison
  timeout_minutes: 60          # local models are slow; give them the wall
  stall_minutes: 25
  max_turns: 200
  stack_presets: stacks.yaml
  prompts_dir: prompts
  local_agents:
    hermes-local: { harness: hermes, model: mlxlocal/mlx-community--Qwen3-Coder-Next-4bit }
design: { screening_resolution: 3, significance_threshold: 0.10 }
promotion: { screening_to_trial: { p_value: 0.10 }, trial_to_production: { posterior_confidence: 0.80 } }
evaluation: { enabled: true, model: opus-4.8 }
