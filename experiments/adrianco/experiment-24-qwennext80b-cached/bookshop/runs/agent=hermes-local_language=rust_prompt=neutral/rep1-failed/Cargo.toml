[package]
name = "book-api"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
thiserror = "1"
futures = "0.3"
rusqlite = { version = "0.27", features = ["bundled"] }

[dev-dependencies]
actix-test = "0.1"

[lib]
name = "book_api"
path = "src/lib.rs"

[[bin]]
name = "book-api"
path = "src/main.rs"

[[test]]
name = "tests"
path = "src/tests.rs"
