[package]
name = "brazilian-soccer-mcp"
version = "0.1.0"
edition = "2021"
description = "MCP server providing a knowledge interface over Brazilian soccer datasets"
license = "MIT"

[[bin]]
name = "brazilian-soccer-mcp"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
csv = "1"

[dev-dependencies]
serde_json = "1"

[profile.test]
opt-level = 1
