[package]
name = "brazilian-soccer-mcp"
version = "0.1.0"
edition = "2021"
description = "Knowledge-graph MCP server for Brazilian soccer data (matches, teams, players, competitions, statistics)"
license = "MIT"

[lib]
name = "brazilian_soccer_mcp"
path = "src/lib.rs"

[[bin]]
name = "brazilian-soccer-mcp"
path = "src/main.rs"

[dependencies]
csv = "1.3"
serde_json = "1"

[profile.release]
opt-level = 2
