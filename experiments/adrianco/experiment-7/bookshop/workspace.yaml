# Experiment 7 — claude-opus-4-8 FAST MODE (bookshop / rest-api-crud)
#
# Measures Claude Opus 4.8 "fast mode" (the /fast toggle — same model, faster
# output; 2.5x speed, cheaper per the 4.8 announcement) against the regular 4.8
# data we already have. No beads (dropped — adds time/cost, no quality gain).
#
# Model level `claude-opus-4-8-fast` is handled by LocalRunner: it runs
# `claude -p --model claude-opus-4-8 --settings '{"fastMode": true}'`
# (fast mode is NOT a distinct model ID; it's the fastMode setting).
#
# Design: 4 language x 1 model x 1 tooling = 4 cells x 3 replicates = 12 runs.
# Compare against experiment-6's regular claude-opus-4-8/none cells (same task).
#
# Run (single shard, with PATH for toolchains):
#   export PATH="/opt/homebrew/opt/openjdk/bin:/opt/homebrew/bin:$HOME/go/bin:$PATH"
#   export JAVA_HOME="/opt/homebrew/opt/openjdk/libexec/openjdk.jdk/Contents/Home"
#   PYTHONPATH=src .venv/bin/retort run --phase screening \
#     --config experiment-7/bookshop/workspace.yaml --resume

experiment:
  name: experiment-7-opus-4-8-fast-bookshop
  visibility: public

# retort requires >=2 levels per factor, so model carries both the fast and
# the regular 4-8 level. We RUN only the fast cells (design-fast.csv); the
# regular-4-8 baseline comes from experiment-6 (same task). tooling is dropped
# (constant none) since beads was retired from the program.
factors:
  language:
    levels: [go, python, clojure, rust]
  model:
    levels: [claude-opus-4-8-fast, claude-opus-4-8]

responses:
  - code_quality
  - token_efficiency
  - test_coverage
  - defect_rate
  - maintainability
  - idiomatic

tasks:
  - source: bundled://rest-api-crud

playpen:
  runner: local
  replicates: 3
  timeout_minutes: 45
  max_turns: 200

design:
  screening_resolution: 3
  significance_threshold: 0.10

promotion:
  screening_to_trial: { p_value: 0.10 }
  trial_to_production: { posterior_confidence: 0.80 }

# Eval DISABLED: the evaluate-run skill only produces supplementary
# PenScore/ReqCov/findings (assessment.json) that no scored response uses, and
# adds up to ~10 min/run. Enable only when you want `retort maturity`.
evaluation:
  enabled: false
  model: claude-opus-4-6
  min_severity_to_file: high
  issue_tracker: beads
