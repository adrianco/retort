[package]
name = "brazilian-soccer-mcp"
version = "0.1.0"
edition = "2021"
description = "MCP server providing a knowledge-graph-style query interface over Brazilian soccer datasets"
license = "MIT"

[lib]
name = "brazilian_soccer_mcp"
path = "src/lib.rs"

[[bin]]
name = "brazilian-soccer-mcp"
path = "src/main.rs"

[dependencies]
anyhow = "1"
chrono = "0.4"
csv = "1.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
