[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "brazilian-soccer-mcp"
version = "1.0.0"
description = "MCP Server for Brazilian Soccer Knowledge Graph"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0.0",
    "pandas>=2.0.0",
]

[project.scripts]
brazilian-soccer-mcp = "server:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-bdd>=7.0.0",
    "pytest-flask>=1.3.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_features.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
bdd_features_base_dir = "tests"

[tool.setuptools.packages.find]
include = ["*"]
