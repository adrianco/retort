[package]
name = "book-api"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "book-api"
path = "src/main.rs"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.31", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
axum-test = "15"
