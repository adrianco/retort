[package]
name = "brazilian-soccer-mcp"
version = "0.1.0"
edition = "2021"

[lib]
name = "brazilian_soccer_mcp"
path = "src/lib.rs"

[[bin]]
name = "brazilian-soccer-mcp"
path = "src/main.rs"

[dependencies]
csv = "1.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", default-features = false, features = ["serde", "std", "clock"] }
anyhow = "1.0"

[profile.release]
lto = "thin"
codegen-units = 1
