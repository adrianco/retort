[package]
name = "brazilian-soccer-mcp"
version = "1.0.0"
edition = "2021"
description = "MCP server providing a knowledge-graph interface over Brazilian soccer datasets"
license = "MIT"

[lib]
name = "brazilian_soccer_mcp"
path = "src/lib.rs"
# The module-level comments contain indented ASCII diagrams, not runnable
# examples, so doctests are disabled.
doctest = false

[[bin]]
name = "brazilian-soccer-mcp"
path = "src/main.rs"

[dependencies]
csv = "1.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
# Tests use the public library API directly (BDD / Given-When-Then style).

[profile.release]
opt-level = 3
