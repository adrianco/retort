[package]
name = "book-api"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0", features = ["bundled"] }
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
actix-http = "3"
actix-test = "0"
