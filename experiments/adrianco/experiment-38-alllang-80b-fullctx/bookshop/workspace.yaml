# Experiment 38 — the FULL 9-language bookshop suite on the 80B at FULL CONTEXT.
# Extends the compaction-threshold finding to every language: LCM_CONTEXT_THRESHOLD=0.9
# (compact at ~236K of 262144 — nearly the full window, vs the promoted 0.7's ~183K). The
# 80B is only characterized on python/go/ts at 0.7; Rust and the niche languages (clojure,
# java, csharp, elixir, erlang) are untested at any high-threshold config. Does full context
# unlock Rust / the niche languages on the 80B? Verified 0.9 resolves via LCMConfig.from_env.
experiment:
  name: experiment-38-alllang-80b-fullctx-bookshop
  visibility: public
factors:
  language: { levels: [python, go, typescript, rust, clojure, java, csharp, elixir, erlang] }
  agent: { levels: [hermes-local, claude-code] }
  prompt: { levels: [neutral, none] }
  stack: { levels: [m80, m35] }
  model: { levels: ["mlxlocal/mlx-community--Qwen3-Coder-Next-4bit", "mlxlocal/Qwen3.6-35B-A3B"] }
responses: [code_quality, token_efficiency, test_coverage, defect_rate, maintainability, idiomatic]
tasks:
  - source: bundled://rest-api-crud
playpen:
  runner: local
  replicates: 3
  timeout_minutes: 60
  stall_minutes: 25
  max_turns: 200
  stack_presets: stacks.yaml
  prompts_dir: prompts
  local_agents:
    hermes-local: { harness: hermes, model: mlxlocal/mlx-community--Qwen3-Coder-Next-4bit }
design: { screening_resolution: 3, significance_threshold: 0.10 }
promotion: { screening_to_trial: { p_value: 0.10 }, trial_to_production: { posterior_confidence: 0.80 } }
evaluation: { enabled: true, model: opus-4.8 }
