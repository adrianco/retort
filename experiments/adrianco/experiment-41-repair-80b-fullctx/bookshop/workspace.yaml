# Experiment 41 — self-repair ITERATION 2 on the 80B's exp-38 near-misses.
#
# exp-38's default inline second-chance already did ONE feedback-driven repair on
# every failing cell (the `_second_try` metric confirms it). So the reported
# near-misses (Rust 0.917, java ~0.75) are already POST-one-repair. exp-41 tests
# iteration 2: does a second dedicated repair pass — seeded with the iter-1 code +
# a fresh FEEDBACK.md via `--repair-from` — close the last 1–2 requirements?
#
# Launch:
#   retort run --phase screening --config workspace.yaml --design design.csv \
#     --repair-from ../../experiment-38-alllang-80b-fullctx/bookshop
#
# Headline: Rust at 0.92 (missing ~1 requirement) is the most-likely-to-flip and
# highest-value — if a repair pass takes Rust from 1/3 to 2–3/3, Rust becomes
# locally viable on the 80B. java/erlang secondary. Repair runs are prompt=repair,
# half-credit, excluded from the headline pass-proportion.
experiment:
  name: experiment-41-repair-80b-fullctx-bookshop
  visibility: public
factors:
  language: { levels: [rust, java, erlang] }
  agent: { levels: [hermes-local, claude-code] }   # design pins hermes-local; registry needs >=2
  prompt: { levels: [repair, neutral] }            # design pins 'repair'
  stack: { levels: [m80, m35] }                    # design pins m80
  model: { levels: ["mlxlocal/mlx-community--Qwen3-Coder-Next-4bit", "mlxlocal/Qwen3.6-35B-A3B"] }
responses: [code_quality, token_efficiency, test_coverage, defect_rate, maintainability, idiomatic]
tasks:
  - source: bundled://rest-api-crud
playpen:
  runner: local
  replicates: 3
  timeout_minutes: 60          # local 80B is slow; give it the wall
  stall_minutes: 25
  max_turns: 200
  stack_presets: stacks.yaml
  prompts_dir: prompts
  local_agents:
    hermes-local: { harness: hermes, model: mlxlocal/mlx-community--Qwen3-Coder-Next-4bit }
design: { screening_resolution: 3, significance_threshold: 0.10 }
promotion: { screening_to_trial: { p_value: 0.10 }, trial_to_production: { posterior_confidence: 0.80 } }
evaluation: { enabled: true, model: opus-4.8 }
