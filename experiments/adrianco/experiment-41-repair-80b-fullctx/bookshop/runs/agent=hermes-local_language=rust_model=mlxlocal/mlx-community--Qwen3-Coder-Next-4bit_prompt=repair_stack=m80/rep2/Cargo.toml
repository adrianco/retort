[package]
name = "book-api"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4"
actix-rt = "2"
diesel = { version = "2", features = ["sqlite"] }
diesel_migrations = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
thiserror = "1"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
actix-test = "0.1"
