# Minimal single-run pipeline validation
# 1 factor combo × 1 replicate = 1 run

factors:
  language:
    levels: [python, typescript]
  model:
    levels: [opus, sonnet]

responses:
  - code_quality

tasks:
  - source: bundled://rest-api-crud

playpen:
  runner: local
  replicates: 1
  timeout_minutes: 10

design:
  screening_resolution: 3
  significance_threshold: 0.10

promotion:
  screening_to_trial: { p_value: 0.10 }
  trial_to_production: { posterior_confidence: 0.80 }
