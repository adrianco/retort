# Retort — Example workspace configuration
#
# Defines an experiment for evaluating AI-assisted development stacks using
# Design of Experiments. This example mirrors what a real screening run
# would look like — small enough to actually run, but exercises the full
# pipeline: factors → design → playpen → score → evaluate → store → analyze.
#
# To use:
#   retort init my-eval --visibility public
#   cp examples/workspace.yaml my-eval/workspace.yaml
#   retort run --phase screening --config my-eval/workspace.yaml --dry-run
#   retort run --phase screening --config my-eval/workspace.yaml
#   retort export csv --db my-eval/retort.db -o results.csv
#   retort analyze --data results.csv -r code_quality -f language -f model -f tooling

experiment:
  name: example-screening
  # public  -> runs/, reports/, evaluations git-tracked + safe to publish.
  # private -> all generated artifacts stay local. Default if omitted.
  visibility: public

# Three factors → 2 × 2 × 2 = 8 cells. With replicates: 3, that's 24 runs.
# Manageable cost (~$5–10 on a small task) and enough power to detect main
# effects with retort analyze.
factors:
  language:
    levels: [python, go]
  model:
    levels: [opus, sonnet]
  tooling:
    levels: [none, beads]

# Response metrics. Only metrics listed here are computed (the registry has
# more — see retort plugin list). Listing `idiomatic` adds an LLM-as-judge
# call per run; omit it if you don't want that cost (~$0.001/run).
responses:
  - code_quality
  - build_time
  - token_efficiency
  - test_coverage
  - defect_rate
  - maintainability
  # - idiomatic           # opt-in: per-run claude haiku call

# Task source. `bundled://` ships with retort. `github://` clones a public
# repo (optionally pointing at a specific spec file). `local://` and
# `git://` are also supported.
tasks:
  - source: bundled://rest-api-crud
  # - source: github://brazil-bench/benchmark-template/brazilian-soccer-mcp-guide.md

playpen:
  runner: local             # 'local' is the supported path; 'docker' is a skeleton.
  replicates: 3
  timeout_minutes: 15
  # cost_limit_usd: 50.00   # supported by scheduler/budget; not yet wired into retort run

  # Local inference cost model — enables cost_usd metric for local/offline models.
  # Without this block, cost_usd is only populated when the agent reports API spend.
  # Example: AMD Radeon RX 9700 XT running a local model (llama3, mistral, etc.)
  # at $0.20/kWh vs. cloud API pricing.
  #
  # Formula:
  #   electricity_per_s  = (power_watts / 1000) * cost_per_kwh / 3600
  #   hardware_per_s     = hardware_cost_usd / (amortization_months * 30 * 24 * 3600 * utilization_fraction)
  #   run_cost           = (electricity_per_s + hardware_per_s) * duration_seconds
  #   cost_per_token     = run_cost / total_tokens
  #
  # local_inference_cost:
  #   cost_per_kwh: 0.20           # USD/kWh — check your electricity bill
  #   power_watts: 210             # RX 9700 XT peak inference draw
  #   hardware_cost_usd: 550       # Street price
  #   amortization_months: 36      # 3-year useful life
  #   utilization_fraction: 0.25   # GPU busy 25% of wall-clock time

design:
  screening_resolution: 3
  significance_threshold: 0.10

promotion:
  screening_to_trial: { p_value: 0.10 }
  trial_to_production: { posterior_confidence: 0.80 }

# Auto-evaluation — after each successful run, score the generated code using
# the evaluate-run skill (and optionally file findings as issues). Failures
# here never abort the experiment. Omit this block to accept defaults.
evaluation:
  enabled: true                    # default true
  model: haiku                     # claude model passed to the skill invocation
  min_severity_to_file: high       # findings below this stay in findings.jsonl only
  issue_tracker: beads             # beads | github | both (private experiments force beads)
