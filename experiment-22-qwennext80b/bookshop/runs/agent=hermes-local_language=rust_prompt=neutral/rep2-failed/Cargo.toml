[package]
name = "book-api"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "book-api"
path = "src/main.rs"

[[test]]
name = "integration"
path = "tests/integration.rs"

[dependencies]
actix-web = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "macros"] }
tokio = { version = "1", features = ["full"] }
thiserror = "1"
env_logger = "0.11"
log = "0.4"

[lib]
name = "book_api"
path = "src/lib.rs"
