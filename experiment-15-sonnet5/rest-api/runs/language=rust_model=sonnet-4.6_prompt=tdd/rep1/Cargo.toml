[package]
name = "book_api"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
tower = { version = "0.4", features = ["util"] }

[dev-dependencies]
http-body-util = "0.1"
tokio = { version = "1", features = ["full"] }
