[project]
name = "brazilian-soccer-mcp"
version = "0.1.0"
description = "MCP server providing a knowledge-graph interface over Brazilian soccer data"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0",
    "pandas>=2.0",
]

[project.scripts]
brazilian-soccer-mcp = "brazilian_soccer_mcp.server:main"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
