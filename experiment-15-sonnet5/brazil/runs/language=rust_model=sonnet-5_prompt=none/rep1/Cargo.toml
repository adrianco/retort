[package]
name = "brazilian-soccer-mcp"
version = "0.1.0"
edition = "2021"

[lib]
name = "brazilian_soccer_mcp"
path = "src/lib.rs"

[[bin]]
name = "brazilian-soccer-mcp"
path = "src/main.rs"

[dependencies]
rmcp = { version = "2.0.0", features = ["transport-io"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std", "io-util", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
csv = "1"
chrono = "0.4"
unicode-normalization = "0.1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
