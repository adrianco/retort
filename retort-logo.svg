<svg width="512" height="512" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glass-grad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="#13091F" stroke="url(#glass-grad)" stroke-width="2.5" />
  <!-- Retort body (round flask) -->
  <circle cx="45" cy="72" r="22" fill="none" stroke="#A78BFA" stroke-width="2.5" />
  <!-- Retort neck bending up and right -->
  <path d="M63 58 Q70 40 85 35" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round" />
  <!-- Liquid inside -->
  <path d="M28 78 Q45 85 62 78" fill="#7C3AED" opacity="0.3" />
  <!-- Bubbles = experiments -->
  <circle cx="40" cy="70" r="2" fill="#C4B5FD" opacity="0.5" />
  <circle cx="48" cy="65" r="1.5" fill="#C4B5FD" opacity="0.4" />
  <circle cx="44" cy="62" r="1.8" fill="#C4B5FD" opacity="0.6" />
  <!-- Distillate drops = results -->
  <ellipse cx="90" cy="40" rx="3" ry="4" fill="#A78BFA" opacity="0.7" />
  <ellipse cx="93" cy="48" rx="2" ry="3" fill="#A78BFA" opacity="0.5" />
</svg>
