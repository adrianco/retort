# Experiment 1: Opus vs Sonnet, Beads vs None, six languages
# Task: rest-api-crud (CRUD book collection API)
# Runner: local (claude CLI on host)
#
# Language extension history:
#   - Original 4: python, typescript, go, rust (48 runs, 46 completed)
#   - Added java + clojure (24 new runs at 3 reps each)

factors:
  language:
    levels: [python, typescript, go, rust, java, clojure]
  model:
    levels: [opus, sonnet]
  tooling:
    levels: [none, beads]

responses:
  - code_quality
  # Timing comes from the auto-persisted _duration_seconds telemetry — see
  # `retort analyze --data ... -r _duration_seconds ...` and the
  # corresponding column in the web report.

tasks:
  - source: bundled://rest-api-crud

playpen:
  runner: local
  replicates: 3
  timeout_minutes: 15

design:
  screening_resolution: 3
  significance_threshold: 0.10

promotion:
  screening_to_trial: { p_value: 0.10 }
  trial_to_production: { posterior_confidence: 0.80 }
